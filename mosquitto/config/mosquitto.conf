# Mosquitto 2.x — demo configuration.
# For production add user/password (password_file), TLS, and ACLs.

# MQTT 3.1.1 / 5.0 listener
listener 1883
allow_anonymous true

# WebSocket listener for browser-based MQTT clients
listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
