# ros_gz_bridge topic configuration.
#
# This file pins the contract between ROS 2 (consumed by mqtt_ros2_bridge)
# and gz/ignition transport (consumed by the Fortress DiffDrive system).
# The MQTT layer never sees gz transport directly.
#
# Note: Fortress uses the `ignition.msgs.*` namespace. Harmonic and later
# use `gz.msgs.*`. The field name in this YAML stays `gz_type_name` in
# either case — only the string value changes.

- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/odom"
  gz_topic_name: "/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS
